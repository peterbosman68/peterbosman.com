<svg width="500" height="220" viewBox="0 0 500 220" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Logo Peter Bosman – altijd op zoek naar Beter</title>
  <desc>Horizontaal logo met cirkel monogram PB links en naam plus tagline rechts, transparante achtergrond</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Raleway:wght@300;500&amp;display=swap');
    </style>
  </defs>

  <!-- Cirkel monogram -->
  <circle cx="108" cy="110" r="76" fill="#1B2A3E"/>
  <circle cx="108" cy="110" r="70" fill="none" stroke="#F5C947" stroke-width="2"/>
  <circle cx="108" cy="110" r="64" fill="none" stroke="#F5C947" stroke-width="0.5" opacity="0.4"/>
  <text x="108" y="128" text-anchor="middle"
    font-family="Playfair Display, serif" font-size="42" font-weight="700" fill="#F5C947">PB</text>

  <!-- Naam: Peter -->
  <text x="212" y="98"
    font-family="Playfair Display, serif" font-size="62" font-weight="700" fill="#1B2A3E">Peter</text>

  <!-- Scheidingslijn -->
  <line x1="212" y1="116" x2="490" y2="116" stroke="#F5C947" stroke-width="1" opacity="0.6"/>

  <!-- Tagline -->
  <text x="212" y="148"
    font-family="Raleway, sans-serif" font-size="20" font-weight="400" letter-spacing="0.8" fill="#5A6A7A">altijd op zoek naar <tspan font-weight="500" fill="#C49A28">Beter</tspan></text>

</svg>
